name: Pipeline de Pruebas PvZ

# El pipeline se ejecutará cada vez que se hagas un "Push" o un "Pull Request" a la rama master
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    # Usamos Windows porque la aplicación de escritorio necesita este entorno para compilar correctamente
    runs-on: windows-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x' # Versión de .NET que se esta usando

    - name: Restaurar dependencias
      run: dotnet restore

    - name: Compilar Proyecto
      run: dotnet build --configuration Release --no-restore

    # Esto ejecutara las pruebas unitarias
    - name: Ejecutar Pruebas Unitarias
      run: dotnet test --no-build --verbosity normal

    # Configuración de Python para tus pruebas de UI con PyAutoGUI
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install pyautogui pytest

    # Este paso intentará ejecutar las pruebas de UI
    - name: Ejecutar Pruebas de UI (PyAutoGUI)
      run: python -m pytest tests_ui/